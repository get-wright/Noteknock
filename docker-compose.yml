services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: noteknock
      POSTGRES_PASSWORD: noteknock
      POSTGRES_DB: noteknock
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteknock -d noteknock"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: